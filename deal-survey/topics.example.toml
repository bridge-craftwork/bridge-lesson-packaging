# deal-survey topic baselines — the difficulty PRIOR per lesson topic.
#
# The objective per-deal signals (probe ladder, auction proxies) measure
# difficulty WITHIN a deal, but not what the LESSON is about: a squeeze lesson's
# hands are harder than a finesse lesson's even when both "make by one technique",
# and Jacoby-2NT auctions are harder than Stayman even when both run uncontested.
# This table supplies that prior; `profile --topics topics.toml` shows your
# baseline next to the observed difficulty so you can calibrate the numbers.
#
# SCALE is ordinal — pick a range and be consistent (0–5 suggested). Higher =
# harder. `bidding` and `cardplay` are independent axes.
#
# MATCHING: each deal is assigned the FIRST topic whose any `match` string is a
# case-insensitive substring of the deal's lesson path (record `source.file`,
# e.g. "Stayman.pbn" or "Competitive Bidding/Negative Doubles/…"). Order matters
# — put more specific topics before generic ones. Unmatched deals use [defaults].
#
# NOTE: every baseline below is a PLACEHOLDER. Tune to your judgment; the point
# of this file is that the numbers are yours, agreed and inspectable.

[defaults]
bidding = 1
cardplay = 1

# ---- bidding topics (cardplay incidental) ----------------------------------

[[topic]]
name = "Basic bidding"
match = ["Opening", "Response", "Rebid", "1NT opening", "Major suit", "Minor suit"]
bidding = 1
cardplay = 1

[[topic]]
name = "Stayman"
match = ["Stayman"]
bidding = 2
cardplay = 1

[[topic]]
name = "Jacoby transfers"
match = ["Transfer", "Jacoby Transfer"]
bidding = 2
cardplay = 1

[[topic]]
name = "Jacoby 2NT"
match = ["Jacoby2NT", "Jacoby 2NT", "Jacoby2NT"]
bidding = 4
cardplay = 2

[[topic]]
name = "Splinters"
match = ["Splinter"]
bidding = 4
cardplay = 2

[[topic]]
name = "Fourth suit forcing"
match = ["FSF", "Fourth Suit"]
bidding = 3
cardplay = 2

[[topic]]
name = "Slam bidding"
match = ["Blackwood", "Gerber", "Slam", "Keycard"]
bidding = 4
cardplay = 2

# ---- competitive / defensive bidding ---------------------------------------

[[topic]]
name = "Overcalls & takeout"
match = ["Overcall", "Takeout", "Balancing", "Competing"]
bidding = 3
cardplay = 2

[[topic]]
name = "Negative / support doubles"
match = ["Negative Double", "Support Double"]
bidding = 3
cardplay = 2

[[topic]]
name = "Preempts & sacrifices"
match = ["Preempt", "Weak Two", "Sacrific", "Overcoming Weak"]
bidding = 3
cardplay = 2

# ---- cardplay topics (bidding incidental) ----------------------------------

[[topic]]
name = "Cash-out / counting winners"
match = ["Counting Winners", "Cash"]
bidding = 1
cardplay = 0

[[topic]]
name = "Establishing tricks"
match = ["Establish", "Length", "Promotion"]
bidding = 1
cardplay = 1

[[topic]]
name = "Finesse"
match = ["Finesse"]
bidding = 1
cardplay = 2

[[topic]]
name = "Trump management / ruffing"
match = ["Trumpmgmt", "Trump Management", "Ruff"]
bidding = 1
cardplay = 2

[[topic]]
name = "Entries & timing"
match = ["Entries", "Timing", "Hold-up", "Holdup", "Ducking"]
bidding = 1
cardplay = 3

[[topic]]
name = "Endplay / elimination"
match = ["Endplay", "Elimination", "Throw-in"]
bidding = 1
cardplay = 4

[[topic]]
name = "Squeeze"
match = ["Squeeze"]
bidding = 1
cardplay = 4
