# deal-survey topic baselines — the difficulty PRIOR per lesson topic.
#
# Two independent ordinal axes, both normalized to 0–5 so equal numbers mean
# comparable expertise across bidding and cardplay:
#
#   bidding  0 natural/no convention · 1 fundamental · 2 common gadget ·
#            3 upper-intermediate · 4 advanced · 5 expert/rare
#   cardplay 0 cash-out · 1 establish · 2 single technique (finesse/ruff) ·
#            3 timing/entries/hold-up · 4 advanced (squeeze/endplay)
#
# The BIDDING scale is derived from Rick's convention ordering (Kantar,
# "25 Bridge Conventions You Should Know" + "25 More…" + an Advanced tier):
#   tier = book base (bk1 = 1, bk2 = 2, advanced = 5) + section offset
#          (§1 = 0, §2 = 1, §3 = 2); Novice situations = 0.
# Where a convention appears in more than one book, the lower (earlier) tier wins.
#
# MATCHING: each deal takes the FIRST topic whose any `match` string is a
# case-insensitive substring of its lesson path (record `source.file`). Entries
# are ordered MOST-SPECIFIC / hardest FIRST so specific names win over generic
# ones (e.g. "Reverse Flannery" and "Reverse Drury" before "Reverse"; "Muppet
# Stayman" before "Stayman"). Unmatched deals fall to [defaults].
#
# Baselines are Rick's to tune; the derivation above is the starting rationale.

[defaults]
bidding = 1
cardplay = 1

