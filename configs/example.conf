# Example collection config for package.sh (sourced as bash; --config or environment).
# Nothing here identifies a specific collection — provenance/license are the collection's own.

INPUT_DIR="Presentation"          # clean lesson PBNs, arranged {category}/{lesson}/
OUTPUT_DIR="Rotations"            # packaged output tree
SET_SIZES="4 5 6"                # board-set slice sizes; a lesson <= a size stays one set
ROTATE_PATTERNS="S,NS,NESW"      # views: online S/NS + in-person NESW
DECLARER_PLAN_CATEGORY="Declarer Play"  # only lessons in these categories get a declarer's plan; "" = all
LIN="0"                          # 1 = also emit LIN files for online play

# Tool paths (defaults shown; override if installed elsewhere)
# BRIDGE_WRANGLER_PATH="$HOME/Development/GitHub/bridge-wrangler/target/release/bridge-wrangler"
# PBN_TO_PDF_PATH="$HOME/Development/GitHub/pbn-to-pdf/target/release/pbn-to-pdf"
# PDF_HANDOUTS_PATH="$HOME/Development/GitHub/pdf-handouts/target/release/pdf-handouts"
